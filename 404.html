<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting - TIDE Club</title>
  <script>
    (function () {
      var parts = window.location.pathname.split('/').filter(Boolean);
      var isRepoPage = parts.length > 1;
      var base = window.location.origin + '/' + (isRepoPage ? parts[0] + '/' : '');
      var route = isRepoPage ? parts.slice(1).join('/') : parts.join('/');
      window.location.replace(base + '#/' + route + window.location.search);
    })();
  </script>
</head>
<body>正在跳转...</body>
</html>
